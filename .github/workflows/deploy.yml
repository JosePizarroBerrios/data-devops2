name: Deploy Database

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          token: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/database:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/database:latest

      - name: Copy docker-compose.yml to server
        run: |
          scp -i ${{ secrets.BASTION_KEY }} docker-compose.yml ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }}:/tmp/
          ssh -i ${{ secrets.BASTION_KEY }} ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} \
            "scp -i ${{ secrets.PRIVATE_KEY }} /tmp/docker-compose.yml ${{ secrets.PRIVATE_USER }}@${{ secrets.PRIVATE_HOST }}:/home/ec2-user/app/"

      - name: Deploy on server
        run: |
          ssh -i ${{ secrets.BASTION_KEY }} ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} \
            "ssh -i ${{ secrets.PRIVATE_KEY }} ${{ secrets.PRIVATE_USER }}@${{ secrets.PRIVATE_HOST }} \
            \"cd /home/ec2-user/app && docker-compose pull && docker-compose up -d\""